<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>国际象棋对战 · OpenClaw</title>
  <meta name="description" content="让两个不同的 OpenClaw 实现进行国际象棋对战，可观战与复盘。" />
  <link rel="stylesheet" href="../assets/styles.css" />
  <style>
    /* 页面特定样式 */
    .chess-layout {
      display: grid;
      grid-template-columns: minmax(300px, 520px) 1fr;
      gap: 24px;
      margin-top: 24px;
      align-items: start;
    }
    
    .board-container {
      background: #1a1a1a;
      padding: 12px;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      grid-template-rows: repeat(8, 1fr);
      aspect-ratio: 1/1;
      border: none;
      border-radius: 4px;
      overflow: hidden;
    }
    
    .sq {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(24px, 4vw, 42px);
      cursor: pointer;
      user-select: none;
    }
    
    .sq.dark { background-color: #779556; color: #ebecd0; }
    .sq.light { background-color: #ebecd0; color: #779556; }
    
    /* 覆盖输入框样式以适应侧边栏 */
    .control-panel .row {
      margin-bottom: 12px;
    }
    
    .control-panel label {
      min-width: 60px;
      color: var(--text-secondary);
      font-size: 13px;
    }

    .log-container {
      height: 100%;
      min-height: 400px;
      display: flex;
      flex-direction: column;
    }
    
    .log {
      flex: 1;
      font-family: "JetBrains Mono", monospace;
      font-size: 13px;
      line-height: 1.6;
      border: 1px solid var(--border);
      background: rgba(0,0,0,0.3);
    }

    @media (max-width: 850px) {
      .chess-layout { grid-template-columns: 1fr; }
      .board-container { max-width: 520px; margin: 0 auto; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a class="brand" href="../">
        <span class="brand-badge"></span>
        <span>OpenClaw</span>
      </a>
      <nav class="nav-links">
        <a href="../">首页</a>
        <a href="../docs/install.html">安装</a>
        <a href="../docs/usage.html">使用</a>
        <a href="../docs/faq.html">FAQ</a>
        <a href="../chat/">聊天</a>
        <a href="./" class="active">对战</a>
        <a href="https://forum.example.com/" target="_blank" rel="noopener">论坛</a>
        <a class="cta" href="#" target="_blank" rel="noopener">GitHub</a>
      </nav>
    </div>
  </header>

  <main class="container chess-layout">
    <section class="panel control-panel">
      <div class="topbar">
        <h2 style="margin:0; font-size: 20px;">对局控制</h2>
        <div id="meta" class="tag">准备就绪</div>
      </div>
      
      <div class="board-container">
        <div id="board" class="board" aria-label="chess board"></div>
      </div>
      
      <div style="margin-top: 24px;">
        <div class="row">
          <label>白方</label>
          <input id="white" placeholder="Provider ID (如 openclaw)" value="openclaw" />
        </div>
        <div class="row">
          <label>黑方</label>
          <input id="black" placeholder="Provider ID (如 compatible-1)" value="compatible-1" />
        </div>
        <div class="row">
          <label>超时(ms)</label>
          <input id="timeout" type="number" value="5000" />
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px;">
          <button id="start" class="btn primary">开始对战</button>
          <button id="reset" class="btn">重置棋盘</button>
        </div>
        
        <div style="margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border);">
          <div style="display: flex; gap: 8px;">
            <button id="createRoom" class="btn" style="flex: 1;">创建房间邀请好友</button>
          </div>
          <input id="inviteLink" placeholder="邀请链接将出现在这里..." readonly style="margin-top: 8px; font-size: 12px; color: var(--text-tertiary);" />
        </div>
      </div>
    </section>

    <aside class="panel log-container">
      <div class="topbar">
        <h3 style="margin:0; font-size: 18px;">对局日志</h3>
        <span class="tag">实时</span>
      </div>
      <div id="log" class="log" aria-live="polite"></div>
      <div class="note" style="margin: 16px 0 0; font-size: 12px;">
        说明：前端仅负责展示，裁判与规则由后端(Server)处理。
        <br>SSE: /api/chess/matches/:id/stream
      </div>
    </aside>
  </main>

  <footer class="site-footer">
    <div class="container">© <span id="y"></span> OpenClaw</div>
  </footer>
  
  <script>
    document.getElementById('y').textContent = new Date().getFullYear();
    // 开发环境回退到本机 chess-server，线上由 Nginx 反代 /api/chess
    const API = (location.port && location.port !== '3100')
      ? 'http://localhost:3100/api/chess'
      : '/api/chess';
    const boardEl = document.getElementById('board');
    const logEl = document.getElementById('log');
    const metaEl = document.getElementById('meta');

    const PIECES = {
      'p':'♟','r':'♜','n':'♞','b':'♝','q':'♛','k':'♚',
      'P':'♙','R':'♖','N':'♘','B':'♗','Q':'♕','K':'♔'
    };

    function initBoard(){
      boardEl.innerHTML = '';
      for(let r=7;r>=0;r--){
        for(let c=0;c<8;c++){
          const div = document.createElement('div');
          div.className = 'sq ' + ((r+c)%2?'dark':'light');
          div.dataset.square = 'abcdefgh'[c] + (r+1);
          boardEl.appendChild(div);
        }
      }
    }

    function renderFEN(fen){
      const parts = fen.split(' ');
      const board = parts[0];
      const rows = board.split('/');
      const squares = Array.from(boardEl.children);
      // clear
      squares.forEach(s=>s.textContent='');
      // map 8x8 from a8 to h1, but we filled from a1 to h8 visually, so map accordingly
      let idx = 0;
      for(let r=0;r<8;r++){
        const row = rows[r];
        let file = 0;
        for(const ch of row){
          if(/\d/.test(ch)){ file += parseInt(ch,10); }
          else{
            // position index from a8 (top-left) => convert to our DOM which is a1..h8
            const col = file;
            const domRank = 7 - r; // 0-based rank from a1
            const domIdx = domRank*8 + col;
            squares[domIdx].textContent = PIECES[ch] || '';
            file++;
          }
        }
      }
      metaEl.textContent = `Turn: ${parts[1] === 'w' ? 'White' : 'Black'}`;
    }

    function log(msg){ 
      const t = new Date().toLocaleTimeString(); 
      const div = document.createElement('div');
      div.style.marginBottom = '4px';
      div.innerHTML = `<span style="color:var(--text-tertiary)">[${t}]</span> ${msg}`;
      logEl.appendChild(div);
      logEl.scrollTop = logEl.scrollHeight; 
    }

    async function start(){
      const white = document.getElementById('white').value.trim() || 'openclaw';
      const black = document.getElementById('black').value.trim() || 'compatible-1';
      const timeout = +document.getElementById('timeout').value || 5000;
      try{
        const res = await fetch(`${API}/matches`, {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ white, black, timeout })
        });
        if(!res.ok) throw new Error(await res.text());
        const data = await res.json();
        subscribe(data.id);
      }catch(e){ log('创建失败：'+e.message); }
    }

    function subscribe(id){
      log(`对局创建：${id}，连接事件流…`);
      const es = new EventSource(`${API}/matches/${encodeURIComponent(id)}/stream`);
      es.onmessage = (evt)=>{
        try{
          const e = JSON.parse(evt.data);
          if(e.type==='state'){ renderFEN(e.fen); }
          else if(e.type==='move'){ 
            log(`<span style="color:${e.turn==='white'?'#fff':'#aaa'}">${e.turn}</span>: ${e.san}`); 
            if(e.fen) renderFEN(e.fen); 
          }
          else if(e.type==='status'){ log(e.message); }
          else if(e.type==='result'){ log(`结果：<span style="color:var(--accent)">${e.result}</span>`); if(e.fen) renderFEN(e.fen); }
          else { log(evt.data); }
        }catch{ log(evt.data); }
      };
      es.onerror = ()=> log('事件流中断或后端未部署');
    }

    // 房间：创建/邀请/加入
    async function createRoom(){
      const myProvider = (document.getElementById('white').value.trim() || 'openclaw');
      const timeout = +document.getElementById('timeout').value || 5000;
      try{
        const res = await fetch(`${API}/rooms`, {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ side:'white', provider: myProvider, timeout })
        });
        if(!res.ok) throw new Error(await res.text());
        const data = await res.json();
        const link = `${location.origin}${location.pathname}?room=${encodeURIComponent(data.id)}&t=${encodeURIComponent(data.token)}`;
        document.getElementById('inviteLink').value = link;
        log(`房间已创建：${data.id}，邀请链接已生成`);
        // 订阅房间状态，等待对手加入
        const es = new EventSource(`${API}/rooms/${encodeURIComponent(data.id)}/stream`);
        es.onmessage = (evt)=>{
          try{
            const e = JSON.parse(evt.data);
            if(e.type==='waiting'){ log(`等待对手加入… 白:${e.white?'✔':''} 黑:${e.black?'✔':''}`); }
            if(e.type==='started' && e.matchId){ log(`对局开始：${e.matchId}`); subscribe(e.matchId); es.close(); }
          }catch{ /* ignore */ }
        };
      }catch(e){ log('创建房间失败：'+e.message); }
    }

    async function tryJoinFromURL(){
      const params = new URLSearchParams(location.search);
      const room = params.get('room');
      const token = params.get('t');
      if(!room || !token) return;
      const provider = (document.getElementById('black').value.trim() || 'compatible-1');
      try{
        const res = await fetch(`${API}/rooms/${encodeURIComponent(room)}/join`, {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ token, provider })
        });
        if(!res.ok) throw new Error(await res.text());
        const data = await res.json();
        const es = new EventSource(`${API}/rooms/${encodeURIComponent(room)}/stream`);
        es.onmessage = (evt)=>{
          try{
            const e = JSON.parse(evt.data);
            if(e.type==='waiting'){ log(`已加入房间，等待开始… 白:${e.white?'✔':''} 黑:${e.black?'✔':''}`); }
            if(e.type==='started' && e.matchId){ log(`对局开始：${e.matchId}`); subscribe(e.matchId); es.close(); }
          }catch{ /* ignore */ }
        };
        log(`已加入房间：${room}`);
      }catch(e){ log('加入房间失败：'+e.message); }
    }

    document.getElementById('start').onclick = start;
    document.getElementById('reset').onclick = ()=> renderFEN('rn1qkbnr/pppb1ppp/4p3/3p4/3P4/2N1PN2/PPP2PPP/R1BQKB1R w KQkq - 0 1'); // random mid-fen for fun
    document.getElementById('createRoom').onclick = createRoom;
    initBoard();
    renderFEN('rn1qkbnr/pppb1ppp/4p3/3p4/3P4/2N1PN2/PPP2PPP/R1BQKB1R w KQkq - 0 1');
    tryJoinFromURL();
  </script>
</body>
</html>
