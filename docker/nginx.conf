server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'" always;
  add_header Referrer-Policy no-referrer-when-downgrade always;
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options SAMEORIGIN always;

  location / {
    try_files $uri $uri/ =404;
  }

  # Unified Gateway for providers
  location /api/ {
    proxy_pass http://gateway:3200/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off; # SSE friendly
    chunked_transfer_encoding off;
  }

  # Chess Arena
  location /api/chess/ {
    proxy_pass http://chess:3100/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off; # SSE support
    chunked_transfer_encoding off;
  }

  location ~* \.(css|js|png|jpg|jpeg|gif|svg|webp|ico)$ {
    expires 30d;
    access_log off;
  }
}
