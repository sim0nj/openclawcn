services:
  openclaw-cn-site:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "80:80"
    depends_on:
      chess:
        condition: service_healthy
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
  chess:
    build:
      context: ../chess-server
      dockerfile: Dockerfile
    expose:
      - "3100"
    environment:
      - GATEWAY_URL=http://gateway:3200
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3100/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
  gateway:
    build:
      context: ../gateway-server
      dockerfile: Dockerfile
    expose:
      - "3200"
    environment:
      - PROVIDER_BOTPY=http://bot-py:5000/move
    depends_on:
      - bot-py
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3200/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
  bot-py:
    build:
      context: ../examples/chess-bot
      dockerfile: Dockerfile
    expose:
      - "5000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:5000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
